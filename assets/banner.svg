<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260" width="1200" height="260" role="img" aria-label="Data Analytics">
  <defs>
    <linearGradient id="slate" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22384A"/>
      <stop offset="0.55" stop-color="#34526B"/>
      <stop offset="1" stop-color="#2A4358"/>
    </linearGradient>
    <linearGradient id="emerald" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1E9E75"/>
      <stop offset="1" stop-color="#3FC496"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1200" height="260" rx="20" fill="url(#slate)"/>
  <!-- emerald bottom accent -->
  <rect x="0" y="248" width="1200" height="12" fill="url(#emerald)"/>

  <!-- data motif (right side): ascending bar chart + trend dots -->
  <g opacity="0.9">
    <rect x="975" y="150" width="26" height="60" rx="3" fill="#3FC496" opacity="0.55"/>
    <rect x="1012" y="120" width="26" height="90" rx="3" fill="#3FC496" opacity="0.7"/>
    <rect x="1049" y="90" width="26" height="120" rx="3" fill="#3FC496" opacity="0.85"/>
    <rect x="1086" y="60" width="26" height="150" rx="3" fill="#3FC496"/>
  </g>
  <g stroke="#8FE0C4" stroke-width="2.5" opacity="0.8" fill="none">
    <polyline points="975,145 1012,110 1049,80 1086,50 1123,35"/>
  </g>
  <g fill="#8FE0C4">
    <circle cx="975" cy="145" r="5"/>
    <circle cx="1012" cy="110" r="5"/>
    <circle cx="1049" cy="80" r="5"/>
    <circle cx="1086" cy="50" r="5"/>
    <circle cx="1123" cy="35" r="6"/>
  </g>

  <!-- text -->
  <text x="64" y="86" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="4" fill="#9FD9C4">DATA ANALYTICS &#183; SELF-PACED STUDY</text>
  <text x="60" y="158" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="72" font-weight="800" fill="#ffffff">Data Analytics</text>
  <text x="64" y="205" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="26" font-weight="500" fill="#CBD9E1">Notes &#183; Exercises &#183; Quizzes &#183; Projects</text>
</svg>
